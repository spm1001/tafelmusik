<!DOCTYPE html>
<html>
<head>
  <title>Tafelmusik</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 0; background: #fff; }
    .status-bar { position: fixed; top: 0.5rem; right: 0.5rem; z-index: 10; display: flex; align-items: center; gap: 0.5rem; }
    .status { font-size: 0.75rem; padding: 2px 8px; border-radius: 8px; }
    .status.connected { color: #22863a; background: #dcffe4; }
    .status.connecting { color: #b08800; background: #fff8c5; }
    .status.disconnected { color: #cb2431; background: #ffdce0; }
    #room-name { font-size: 0.75rem; color: #999; }

    /* Split layout — each pane scrolls independently */
    .editor-layout { display: flex; height: 100vh; }
    #files-pane { width: 220px; border-right: 1px solid #eee; overflow-y: auto; background: #fafafa; font-size: 0.8rem; flex-shrink: 0; }
    #files-pane.collapsed { display: none; }
    .files-header { padding: 0.5rem 0.75rem; font-weight: 600; font-size: 0.75rem; color: #666; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
    .files-header button { background: none; border: none; cursor: pointer; color: #999; font-size: 0.9rem; padding: 0 4px; }
    .files-header button:hover { color: #333; }
    .files-tree { padding: 0.25rem 0; }
    .file-item { padding: 3px 0.75rem; cursor: pointer; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 4px; }
    .file-item:hover { background: #e8e8e8; }
    .file-item.active { background: #dbeafe; color: #1d4ed8; }
    .file-item.current { font-weight: 600; background: #fef3c7; }
    .file-item .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .file-item .dot.active { background: #22c55e; }
    .file-item .dot.inactive { background: #d4d4d4; }
    .dir-item { padding: 3px 0.75rem; font-weight: 600; color: #666; font-size: 0.75rem; cursor: pointer; user-select: none; }
    .dir-item:hover { color: #333; }
    .dir-group.collapsed > :not(.dir-item) { display: none; }
    .files-toggle { position: fixed; top: 0.5rem; left: 0.5rem; z-index: 10; background: none; border: none; cursor: pointer; font-size: 1rem; color: #999; padding: 2px; }
    .files-toggle:hover { color: #333; }
    #files-search { width: calc(100% - 1.5rem); margin: 0.5rem 0.75rem; padding: 4px 6px; font-size: 0.75rem; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
    #files-search::placeholder { color: #aaa; }
    .files-section { padding: 0.25rem 0; }
    .files-section-label { padding: 4px 0.75rem; font-size: 0.65rem; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: 0.5px; }
    .search-hint { padding: 0.5rem 0.75rem; font-size: 0.75rem; color: #999; font-style: italic; }
    #editor-pane { flex: 1; min-width: 0; overflow: hidden; }
    #comments-pane { flex: 1; min-width: 0; border-left: 1px solid #eee; overflow-y: auto; background: #fafafa; display: flex; flex-direction: column; }
    #comments-list { flex: 1; overflow-y: auto; padding: 1rem; padding-bottom: 50vh; }
    .cm-editor { border: none; height: 100%; }
    .cm-editor .cm-scroller { overflow: auto; }
    .cm-editor .cm-content { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 14px; padding: 1rem; }

    /* Comment highlight in editor */
    .cm-comment-highlight { background: rgba(255, 212, 0, 0.15); border-bottom: 2px solid #ffd400; }

    /* Comment cards */
    .comment-card { margin-bottom: 0.75rem; padding: 0.75rem; background: #fff; border: 1px solid #e0e0e0; border-left: 3px solid #e0e0e0; border-radius: 6px; font-size: 0.85rem; line-height: 1.5; cursor: pointer; }
    .comment-card.author-sameer { border-left-color: #4a9eff; }
    .comment-card.author-claude { border-left-color: #d4a574; }
    .comment-card:hover { border-color: #ccc; }
    .comment-card.active { border-color: #ffd400; box-shadow: 0 0 0 1px #ffd400; }
    .comment-quote { color: #666; font-style: italic; border-left: 2px solid #ffd400; padding-left: 0.5rem; margin-bottom: 0.5rem; font-size: 0.8rem; white-space: pre-wrap; }
    .comment-author { font-weight: 600; font-size: 0.75rem; color: #999; margin-bottom: 0.25rem; }
    .comment-body { color: #333; }
    .comment-resolve { margin-top: 0.5rem; padding: 3px 10px; border: 1px solid #ddd; border-radius: 4px; background: #fff; cursor: pointer; font-size: 0.75rem; color: #666; }
    .comment-resolve:hover { background: #f5f5f5; }
    .comment-card.orphaned { opacity: 0.45; border-left-color: #ccc; }
    .comment-card.orphaned:hover { opacity: 0.7; }

    /* Compose card (inline in flow) */
    .compose-card { margin-bottom: 0.75rem; padding: 0.75rem; background: #fff; border: 1px solid #ffd400; border-radius: 6px; }
    .compose-card .comment-quote { margin-bottom: 0.5rem; }
    .compose-editor .cm-editor { border: 1px solid #ddd; border-radius: 4px; min-height: 48px; max-height: 150px; height: auto; }
    .compose-editor .cm-editor.cm-focused { border-color: #ffd400; }
    .compose-editor .cm-scroller { overflow: auto; }
    .compose-editor .cm-content { padding: 0.5rem; font-family: -apple-system, system-ui, sans-serif; font-size: 0.85rem; }
    .compose-editor .cm-gutters { display: none; }
    .compose-editor .cm-activeLine { background: transparent; }
    .compose-hint { font-size: 0.7rem; color: #999; margin-top: 0.4rem; text-align: right; }

    /* Empty state */
    .comments-empty { color: #999; font-size: 0.85rem; text-align: center; padding: 2rem 1rem; }
  </style>
</head>
<body>
  <div class="status-bar">
    <span id="room-name"></span>
    <span id="connection-status" class="status connecting">connecting</span>
  </div>
  <button class="files-toggle" id="files-toggle" title="Toggle file browser">&#9776;</button>
  <div class="editor-layout">
    <div id="files-pane">
      <div class="files-header">
        <span>Documents</span>
        <button id="files-close" title="Close">&times;</button>
      </div>
      <input type="text" id="files-search" placeholder="Search or create..." />
      <div class="files-tree" id="files-tree"></div>
    </div>
    <div id="editor-pane"></div>
    <div id="comments-pane">
      <div id="comments-list"></div>
    </div>
  </div>

  <pre id="error-log" style="color:red; font-size:12px; max-height:200px; overflow:auto;"></pre>
  <script>
    window.onerror = function(msg, src, line, col, err) {
      document.getElementById('error-log').textContent += msg + ' at ' + src + ':' + line + '\n';
    };
  </script>
  <script src="/static/editor.js"></script>
</body>
</html>
