<!DOCTYPE html>
<html>
<head>
  <title>Tafelmusik</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 1rem; background: #fff; }
    h1 { font-size: 1.2rem; color: #666; margin: 0; }
    .editor-wrap { display: flex; gap: 1rem; }
    .cm-editor { border: 1px solid #ddd; border-radius: 4px; height: calc(100vh - 80px); }
    .cm-editor .cm-scroller { overflow: auto; }
    .cm-editor .cm-content { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 14px; }
    .preview { flex: 1; border: 1px solid #ddd; border-radius: 4px; padding: 1rem; overflow: auto; height: calc(100vh - 80px); box-sizing: border-box; font-size: 15px; line-height: 1.6; }
    .preview table { border-collapse: collapse; margin: 1em 0; }
    .preview th, .preview td { border: 1px solid #ddd; padding: 6px 12px; text-align: left; }
    .preview th { background: #f5f5f5; }
    .preview blockquote { border-left: 3px solid #ddd; margin-left: 0; padding-left: 1em; color: #666; }
    .preview code { background: #f5f5f5; padding: 2px 4px; border-radius: 3px; font-size: 0.9em; }
    .preview pre { background: #1e1e1e; color: #d4d4d4; padding: 1em; border-radius: 4px; overflow-x: auto; }
    .preview pre code { background: none; color: inherit; padding: 0; }
    .preview hr { border: none; border-top: 1px solid #ddd; }
    .pane { flex: 1; min-width: 0; }
    .header { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.5rem; }
    .tabs { display: flex; gap: 0.5rem; }
    .tabs button { padding: 4px 12px; border: 1px solid #ddd; border-radius: 4px; background: #f9f9f9; cursor: pointer; font-size: 0.85rem; }
    .tabs button.active { background: #333; color: #fff; border-color: #333; }
    .status { font-size: 0.75rem; padding: 2px 8px; border-radius: 8px; }
    .status.connected { color: #22863a; background: #dcffe4; }
    .status.connecting { color: #b08800; background: #fff8c5; }
    .status.disconnected { color: #cb2431; background: #ffdce0; }
    #room-name { font-size: 0.85rem; color: #999; }
  </style>
</head>
<body>
  <div style="max-width: 1800px; margin: 0 auto;">
    <div class="header">
      <h1>Tafelmusik</h1>
      <span id="room-name"></span>
      <span id="connection-status" class="status connecting">connecting</span>
      <div class="tabs">
        <button id="btn-edit" class="active" onclick="setMode('edit')">Edit</button>
        <button id="btn-split" onclick="setMode('split')">Split</button>
        <button id="btn-preview" onclick="setMode('preview')">Preview</button>
      </div>
    </div>
    <div class="editor-wrap" id="container">
      <div class="pane" id="editor-pane"></div>
      <div class="preview pane" id="preview-pane" style="display:none;"></div>
    </div>
  </div>

  <pre id="error-log" style="color:red; font-size:12px; max-height:200px; overflow:auto;"></pre>
  <script>
    window.onerror = function(msg, src, line, col, err) {
      document.getElementById('error-log').textContent += msg + ' at ' + src + ':' + line + '\n';
    };
  </script>
  <script src="editor.js"></script>
</body>
</html>
